<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Leithmail">

  <!-- Favicon -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Leithmail">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/svg" href="favicon.svg" />

  <title>Leithmail</title>
  <link rel="manifest" href="manifest.json">
  <script type="application/javascript" src="assets/packages/flutter_charset_detector_web/assets/web/jschardet.min.js"
    defer></script>

  <style>
    body {
      margin: 0;
      background-color: #ffffff;
    }

    #splash {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    @keyframes breathe {
      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.12);
      }
    }

    #splash img {
      width: 80px;
      height: 80px;
      animation: breathe 1.4s ease-in-out infinite;
    }
  </style>
</head>

<body>
  <div id="splash">
    <img src="favicon.svg" alt="Leithmail" />
  </div>
  <script>
    {{flutter_bootstrap_js}}
  </script>
</body>

</html>
