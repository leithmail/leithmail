<!DOCTYPE html>
<html>

<head>
    <title>Leithmail</title>
</head>

<body>
    <script>
        window.onload = function () {
            if (window.opener) {
                window.opener.postMessage(window.location.href, window.location.origin);
                window.close();
            }
        };
    </script>
</body>

</html>
